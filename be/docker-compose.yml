services:
  # ===== Application Services =====

  gateway:
    build:
      context: .
      dockerfile: FptuGradingSystem.Gateway/Dockerfile
    container_name: grading-gateway
    ports:
      - "8000:8080"
    depends_on:
      - auth-api
      - api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__auth-cluster__Destinations__destination1__Address=http://auth-api:8080
      - ReverseProxy__Clusters__grading-cluster__Destinations__destination1__Address=http://api:8080
    networks:
      - grading-network

  auth-api:
    build:
      context: .
      dockerfile: FptuGradingSystem.AuthService/FptuGradingSystem.AuthService.API/Dockerfile
    container_name: grading-auth-api
    ports:
      - "5002:8080"
    depends_on:
      - postgres
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=FptuAuthDb;Username=postgres;Password=12345
    networks:
      - grading-network

  api:
    build:
      context: .
      dockerfile: FptuGradingSystem.GradingService/FptuGradingSystem.API/Dockerfile
    container_name: grading-api
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - redis
      - score-calculator-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=FptuGradingDb;Username=postgres;Password=12345
      - Redis__ConnectionString=redis:6379
      - GrpcService__Address=http://score-calculator-service:8080
    networks:
      - grading-network

  score-calculator-service:
    build:
      context: .
      dockerfile: FptuGradingSystem.ScoreCalculatorService/Dockerfile
    container_name: grading-score-calculator-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - grading-network

  worker:
    build:
      context: .
      dockerfile: FptuGradingSystem.Worker/Dockerfile
    container_name: grading-worker
    depends_on:
      - postgres
      - redis
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=FptuGradingDb;Username=postgres;Password=12345
      - Redis__ConnectionString=redis:6379
    networks:
      - grading-network

  # ===== Infrastructure Services =====

  postgres:
    image: postgres:16-alpine
    container_name: grading-postgres
    environment:
      POSTGRES_DB: FptuGradingDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - grading-network

  redis:
    image: redis:7-alpine
    container_name: grading-redis
    ports:
      - "6379:6379"
    networks:
      - grading-network

networks:
  grading-network:
    driver: bridge

volumes:
  postgres-data:
