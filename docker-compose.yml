version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: fptu_redis
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: fptu_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: FptuGradingSystemDb
    ports:
      - "5432:5432"
    restart: always
